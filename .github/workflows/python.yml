name: Daily Reminder

on:
  schedule:
    - cron: '0 4 * * *'

  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Libraries
        run: |
          pip install pandas
          pip install openpyxl

      - name: Run Script
        run: python main.py
