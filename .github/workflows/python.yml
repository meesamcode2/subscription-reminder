name: Daily Reminder

on:
  schedule:
    - cron: '0 4 * * *'

  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Libraries
        run: |
          pip install pandas openpyxl

      - name: Show Files
        run: ls -R

      - name: Run Script
        run: python main.py
